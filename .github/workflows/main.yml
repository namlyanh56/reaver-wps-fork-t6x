name: Build Static ARMv7 Router
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Toolchain and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabi make

    - name: Compile Libpcap Statically
      run: |
        git clone --depth 1 https://github.com
        cd libpcap
        export CC=arm-linux-gnueabi-gcc
        ./configure --host=arm-linux-gnueabi --disable-shared --enable-static
        make
        echo "PCAP_PATH=$(pwd)" >> $GITHUB_ENV

    - name: Compile Reaver Pure Static
      run: |
        cd src
        export CC=arm-linux-gnueabi-gcc
        ./configure --host=arm-linux-gnueabi LDFLAGS="-static -L${{ env.PCAP_PATH }}" CFLAGS="-I${{ env.PCAP_PATH }}" --disable-sqlite
        make

    - name: Save Artifact
      uses: actions/upload-artifact@v4
      with:
        name: reaver-static-armv7
        path: src/reaver
